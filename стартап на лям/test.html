<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizBot - Тестовый чат</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .status {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 14px;
        }
        .status.error {
            background: #ffebee;
            color: #c62828;
        }
        .info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 14px;
            color: #1565c0;
            text-align: left;
        }
        .info code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background: #5a67d8;
        }
        .widget-placeholder {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            background: #f9f9f9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 BizBot Demo</h1>
        <p>AI-ассистент для вашего бизнеса</p>
        
        <div id="status" class="status">🟢 Проверка подключения...</div>
        
        <div class="widget-placeholder">
            <strong>💬 Чат появится в правом нижнем углу</strong>
            <p style="margin-top: 10px; font-size: 12px; color: #666;">Нажмите на кружок, чтобы начать общение</p>
        </div>
        
        <div class="info">
            📌 <strong>Информация:</strong><br>
            • Бизнес ID: <code>b76d1271</code><br>
            • Сервер: <code>http://localhost:8000</code><br>
            • Нажмите на кнопку в правом нижнем углу, чтобы открыть чат
        </div>
        
        <button onclick="checkServer()">🔄 Проверить сервер</button>
    </div>

    <!-- ВСТРОЕННЫЙ ВИДЖЕТ BIZBOT -->
    <script>
        // Конфигурация
        const BUSINESS_ID = "b76d1271";
        const API_URL = "http://localhost:8000";
        
        // Проверка сервера
        async function checkServer() {
            const statusDiv = document.getElementById('status');
            try {
                const response = await fetch(API_URL + '/api/health');
                if (response.ok) {
                    const data = await response.json();
                    statusDiv.innerHTML = '✅ Сервер работает! Статус: ' + data.status;
                    statusDiv.className = 'status';
                } else {
                    throw new Error('Server error');
                }
            } catch (error) {
                statusDiv.innerHTML = '❌ Сервер не запущен! Запустите: python main.py';
                statusDiv.className = 'status error';
            }
        }
        
        // Проверяем при загрузке
        checkServer();
        
        // Виджет чата
        (function() {
            const businessId = BUSINESS_ID;
            const apiUrl = API_URL;
            let sessionId = localStorage.getItem('bizbot_session_' + businessId);
            if (!sessionId) {
                sessionId = 'web_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('bizbot_session_' + businessId, sessionId);
            }
            
            let ws = null;
            let isOpen = false;
            
            // Стили виджета
            const style = document.createElement('style');
            style.textContent = `
                /* BizBot Widget Styles */
                .bizbot-widget-btn {
                    position: fixed;
                    bottom: 20px;
                    right: 20px;
                    width: 60px;
                    height: 60px;
                    background: linear-gradient(135deg, #667eea, #764ba2);
                    border-radius: 50%;
                    cursor: pointer;
                    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    z-index: 99999;
                    transition: transform 0.2s;
                }
                .bizbot-widget-btn:hover {
                    transform: scale(1.05);
                }
                .bizbot-widget-container {
                    position: fixed;
                    bottom: 90px;
                    right: 20px;
                    width: 360px;
                    height: 500px;
                    background: white;
                    border-radius: 16px;
                    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                    display: none;
                    flex-direction: column;
                    overflow: hidden;
                    z-index: 99999;
                    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                }
                .bizbot-widget-header {
                    background: linear-gradient(135deg, #667eea, #764ba2);
                    color: white;
                    padding: 15px 18px;
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                }
                .bizbot-widget-title {
                    font-weight: bold;
                    font-size: 16px;
                }
                .bizbot-widget-close {
                    background: none;
                    border: none;
                    color: white;
                    font-size: 24px;
                    cursor: pointer;
                    line-height: 1;
                }
                .bizbot-widget-messages {
                    flex: 1;
                    overflow-y: auto;
                    padding: 15px;
                    background: #f5f5f5;
                }
                .bizbot-message {
                    margin-bottom: 12px;
                    display: flex;
                }
                .bizbot-message.user {
                    justify-content: flex-end;
                }
                .bizbot-message.bot {
                    justify-content: flex-start;
                }
                .bizbot-bubble {
                    max-width: 75%;
                    padding: 10px 14px;
                    border-radius: 18px;
                    font-size: 14px;
                    line-height: 1.4;
                }
                .bizbot-message.user .bizbot-bubble {
                    background: #667eea;
                    color: white;
                    border-radius: 18px 18px 4px 18px;
                }
                .bizbot-message.bot .bizbot-bubble {
                    background: white;
                    color: #333;
                    border-radius: 18px 18px 18px 4px;
                    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
                }
                .bizbot-typing {
                    display: inline-block;
                    padding: 10px 14px;
                    background: white;
                    border-radius: 18px;
                }
                .bizbot-typing span {
                    display: inline-block;
                    width: 8px;
                    height: 8px;
                    border-radius: 50%;
                    background: #999;
                    margin: 0 2px;
                    animation: bizbotTyping 1.4s infinite;
                }
                .bizbot-typing span:nth-child(2) {
                    animation-delay: 0.2s;
                }
                .bizbot-typing span:nth-child(3) {
                    animation-delay: 0.4s;
                }
                @keyframes bizbotTyping {
                    0%, 60%, 100% { transform: translateY(0); }
                    30% { transform: translateY(-4px); }
                }
                .bizbot-input-area {
                    display: flex;
                    padding: 12px;
                    border-top: 1px solid #eee;
                    background: white;
                    gap: 8px;
                }
                .bizbot-input {
                    flex: 1;
                    padding: 10px 14px;
                    border: 1px solid #ddd;
                    border-radius: 25px;
                    outline: none;
                    font-size: 14px;
                }
                .bizbot-input:focus {
                    border-color: #667eea;
                }
                .bizbot-send {
                    padding: 10px 20px;
                    background: #667eea;
                    color: white;
                    border: none;
                    border-radius: 25px;
                    cursor: pointer;
                    font-weight: bold;
                }
                .bizbot-send:hover {
                    background: #5a67d8;
                }
            `;
            document.head.appendChild(style);
            
            // HTML виджета
            document.body.insertAdjacentHTML('beforeend', `
                <div class="bizbot-widget-btn">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
                        <path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h4l4 4 4-4h4c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
                    </svg>
                </div>
                <div class="bizbot-widget-container">
                    <div class="bizbot-widget-header">
                        <span class="bizbot-widget-title">💬 AI Ассистент</span>
                        <button class="bizbot-widget-close">×</button>
                    </div>
                    <div class="bizbot-widget-messages"></div>
                    <div class="bizbot-input-area">
                        <input type="text" class="bizbot-input" placeholder="Напишите сообщение...">
                        <button class="bizbot-send">Отправить</button>
                    </div>
                </div>
            `);
            
            // DOM элементы
            const btn = document.querySelector('.bizbot-widget-btn');
            const container = document.querySelector('.bizbot-widget-container');
            const closeBtn = document.querySelector('.bizbot-widget-close');
            const messagesDiv = document.querySelector('.bizbot-widget-messages');
            const input = document.querySelector('.bizbot-input');
            const sendBtn = document.querySelector('.bizbot-send');
            
            function addMessage(role, text) {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'bizbot-message ' + role;
                messageDiv.innerHTML = '<div class="bizbot-bubble">' + escapeHtml(text) + '</div>';
                messagesDiv.appendChild(messageDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
            
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            function showTyping() {
                const typingDiv = document.createElement('div');
                typingDiv.className = 'bizbot-message bot';
                typingDiv.id = 'bizbot-typing';
                typingDiv.innerHTML = '<div class="bizbot-typing"><span></span><span></span><span></span></div>';
                messagesDiv.appendChild(typingDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
            
            function hideTyping() {
                const typing = document.getElementById('bizbot-typing');
                if (typing) typing.remove();
            }
            
            function connectWebSocket() {
                const wsUrl = apiUrl.replace('http', 'ws') + '/ws/chat/' + sessionId + '?business_id=' + businessId;
                ws = new WebSocket(wsUrl);
                
                ws.onopen = function() {
                    console.log('✅ WebSocket connected');
                };
                
                ws.onmessage = function(event) {
                    const data = JSON.parse(event.data);
                    if (data.type === 'bot' && data.text) {
                        hideTyping();
                        addMessage('bot', data.text);
                    }
                };
                
                ws.onerror = function(error) {
                    console.error('WebSocket error:', error);
                    hideTyping();
                    addMessage('bot', 'Извините, технические неполадки. Пожалуйста, попробуйте позже.');
                };
            }
            
            function sendMessage() {
                const text = input.value.trim();
                if (!text) return;
                
                addMessage('user', text);
                input.value = '';
                
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    connectWebSocket();
                    setTimeout(() => {
                        showTyping();
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            ws.send(JSON.stringify({text: text, name: "Клиент"}));
                        }
                    }, 500);
                } else {
                    showTyping();
                    ws.send(JSON.stringify({text: text, name: "Клиент"}));
                }
            }
            
            // Обработчики событий
            btn.onclick = function() {
                if (container.style.display === 'flex') {
                    container.style.display = 'none';
                } else {
                    container.style.display = 'flex';
                    if (!ws || ws.readyState !== WebSocket.OPEN) {
                        connectWebSocket();
                    }
                }
            };
            
            closeBtn.onclick = function() {
                container.style.display = 'none';
            };
            
            sendBtn.onclick = sendMessage;
            input.onkeypress = function(e) {
                if (e.key === 'Enter') sendMessage();
            };
            
            // Проверка соединения при открытии
            setInterval(function() {
                if (ws && ws.readyState === WebSocket.CLOSED) {
                    ws = null;
                }
            }, 5000);
        })();
    </script>
</body>
</html>
